<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analysis Report | FlowZint</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: #f8fafc; }
        .card { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; }
    </style>
</head>
<body class="p-5">
    <div class="container mt-5">
        <div class="card p-5 shadow">
            <h2 class="mb-4">Analysis Report</h2>
            
            <div class="mb-4">
                <h5>Overall Severity: 
                    <span class="badge bg-danger">{{ results.severity }}</span>
                </h5>
            </div>

            <h5 class="mt-3">Vulnerabilities Detected:</h5>
            <div class="list-group">
                {% for vuln in results.vulnerabilities %}
                    <div class="list-group-item bg-dark text-white border-secondary">
                        <span class="text-warning">⚠</span> {{ vuln }}
                    </div>
                {% endfor %}
            </div>

            <div class="mt-4">
                <a href="/" class="btn btn-outline-light">Scan Another Contract</a>
            </div>
        </div>
    </div>
</body>
</html>
