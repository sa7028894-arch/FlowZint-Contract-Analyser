<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-glow: #8b5cf6;
            --text-main: #f8fafc;
        }

        body { 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: radial-gradient(circle at top right, #1e1b4b, var(--bg-color));
            font-family: 'Inter', -apple-system, sans-serif;
        }

        .card { 
            background: var(--card-bg); 
            padding: 48px; 
            border-radius: 24px; 
            backdrop-filter: blur(20px); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            text-align: center; 
            width: 320px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h2 { color: var(--text-main); margin-bottom: 8px; font-weight: 700; }
        p { color: #94a3b8; font-size: 0.9em; margin-bottom: 30px; }

        input { 
            width: 100%; padding: 14px; margin: 12px 0; 
            border: 2px solid #334155; 
            border-radius: 12px; background: #0f172a;
            color: white; box-sizing: border-box;
            transition: border 0.3s;
        }
        input:focus { border-color: var(--accent-glow); outline: none; }

        button { 
            width: 100%; padding: 14px; background: var(--accent-glow); 
            border: none; border-radius: 12px; color: white; 
            font-weight: 600; cursor: pointer; margin-top: 20px;
            box-shadow: 0 4px 14px 0 rgba(139, 92, 246, 0.39);
            transition: 0.3s;
        }
        button:hover { background: #7c3aed; transform: translateY(-2px); }

        .extra { color: #64748b; font-size: 0.8em; margin-top: 20px; }
        a { color: var(--accent-glow); text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Dashboard</h2>
        <p>Enter your credentials to continue</p>
        <input id="user" placeholder="Username">
        <input id="pass" type="password" placeholder="Password">
        <button onclick="auth()">Login</button>
        <div class="extra">
            <input type="checkbox" style="width: auto;"> Remember me <br><br>
            <a href="#">Forgot password?</a>
        </div>
    </div>
    <script>
        async function auth() {
            let u = document.getElementById('user').value;
            let p = document.getElementById('pass').value;
            let res = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: u, password: p})
            });
            let result = await res.json();
            alert(result.status === 'success' ? 'Welcome back!' : 'Login failed');
        }
    </script>
</body>
</html>
